<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login - SiteCraft Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sepatu.css">

</head>

<body>
    <script src="sepatu.js"></script>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <h1>SiteCraft Store</h1>
        <p>Sepatu premium dengan gaya modern untuk penampilan terbaikmu.</p>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="login-box">
            <h2>Login</h2>

            <!-- EMAIL -->
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">

            <div class="options">
                <label><input type="checkbox"> Remember me</label>
                <a href="#">Forgot?</a>
            </div>

            <button class="btn-primary" onclick="loginEmail()">Login dengan Email</button>

            <div class="divider">atau</div>

            <!-- GOOGLE -->
            <button class="btn-google" onclick="loginGoogle()">Login dengan Google</button>

        </div>
    </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
</body>
</html>
